<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CareerPilot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <canvas id="particles-canvas"></canvas>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <h1>CareerPilot</h1>
            </div>

            <h2 class="auth-title">Create Account</h2>

            <form id="registerForm">
                <div class="form-group">
                    <label for="full_name">Full Name</label>
                    <input type="text" id="full_name" name="full_name" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number (optional)</label>
                    <input type="tel" id="phone" name="phone" placeholder="+91 9876543210">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Min 6 characters" required minlength="6">
                    <span class="input-icon" onclick="togglePassword()">👁️</span>
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat password" required>
                </div>

                <button type="submit" class="btn btn-primary" id="registerBtn">
                    <span id="registerText"> Create Account</span>
                    <div class="spinner" id="registerSpinner" style="display:none;"></div>
                </button>
            </form>

            <div class="auth-link">
                Already have an account? <a href="login.html">Sign in</a>
            </div>
        </div>
                <h1 class="gradient-text">
            MISTAKES HAVE THE POWER TO TURN YOU INTO SOMETHING BETTER THAN YOU WERE BEFORE <br>
        </h1>

    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="../js/common.js"></script>
    <script src="../js/particles.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
