<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CareerPilot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <canvas id="particles-canvas"></canvas>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <h1>CareerPilot</h1>
            </div>

            <h2 class="auth-title">Log in</h2>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                    <span class="input-icon" onclick="togglePassword()">👁️</span>
                </div>

                <a href="#" class="forgot-link">Forgot password?</a>

                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <span id="loginText">Log in</span>
                    <div class="spinner" id="loginSpinner" style="display:none;"></div>
                </button>
            </form>

            <div class="auth-link">
                Don't have an account? <a href="register.html">Sign up</a>
            </div>
        </div>
                <h1 class="gradient-text">
            IF YOU SET A GOAL FOR YOURSELF AND ARE ABLE TO ACHIEVE IT, YOU HAVE WON YOUR RACE.  <br>
        </h1>

    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="../js/common.js"></script>
    <script src="../js/particles.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
